services:
  - type: web
    name: quoted-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 4000
